services:
  hangouts:
    build: .
    image: hangouts:latest
    stdin_open: true
    tty: true
    working_dir: /workspace
    env_file:
      - .env
    environment:
      - GITHUB_TOKEN
    volumes:
      # Workspace
      - ${WORKSPACE:-./}:/workspace

      # Agent configs (read-write)
      - ${HOME}/.claude:/home/agent/.claude
      - ${HOME}/.claude.json:/home/agent/.claude.json
      - ${HOME}/.codex:/home/agent/.codex
      - ${HOME}/.gemini:/home/agent/.gemini
      - ${HOME}/.config/gh:/home/agent/.config/gh
      - ${HOME}/.config/github-copilot:/home/agent/.config/github-copilot

      # git config (read-only)
      - ${HOME}/.gitconfig:/home/agent/.gitconfig:ro

      # Keyring (credential storage for copilot etc.)
      - keyring:/home/agent/.local/share/keyrings

      # Docker socket
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  keyring:
