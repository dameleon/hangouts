services:
  hangouts:
    build: .
    image: hangouts:latest
    stdin_open: true
    tty: true
    working_dir: ${WORKSPACE:-/workspace}
    env_file:
      - .env
    environment:
      - GITHUB_TOKEN
    volumes:
      # Workspace（host と同じ絶対パスで mount）
      - ${WORKSPACE:-./}:${WORKSPACE:-/workspace}
      # Agent config（.container/ 配下を直接 mount）
      - ./.container/.claude:/home/agent/.claude
      - ./.container/.claude.json:/home/agent/.claude.json
      - ./.container/.codex:/home/agent/.codex
      - ./.container/.gemini:/home/agent/.gemini
      - ./.container/.config/gh:/home/agent/.config/gh
      - ./.container/.config/github-copilot:/home/agent/.config/github-copilot
      # Keyring persistence
      - keyring:/home/agent/.local/share/keyrings
      # Docker-in-Docker
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  keyring:
